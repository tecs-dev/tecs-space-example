name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check-build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    env:
      TECS_DIR: ${{ github.workspace }}/tecs

    steps:
      - name: Check out starter
        uses: actions/checkout@v4
        with:
          path: tecs-starter

      - name: Check out Tecs
        uses: actions/checkout@v4
        with:
          repository: tecs-dev/tecs
          path: tecs

      - name: Check out tecs-cli
        uses: actions/checkout@v4
        with:
          repository: tecs-dev/tecs-cli
          path: tecs-cli

      - name: Set up LuaJIT
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "luajit"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v4
        with:
          luarocksVersion: "3.12.2"

      - name: Install tecs-cli
        working-directory: tecs-cli
        run: |
          luarocks --lua-version=5.1 install --local https://luarocks.org/ansicolors-1.0.2-3.src.rock
          luarocks --lua-version=5.1 install --local https://luarocks.org/argparse-0.7.2-1.src.rock
          luarocks --lua-version=5.1 install --local https://luarocks.org/luafilesystem-1.9.0-1.src.rock
          luarocks --lua-version=5.1 make --local --deps-mode=none tecs-cli-0.1.0-1.rockspec

      - name: Install Teal
        working-directory: tecs-starter
        run: |
          vendor_tree="$PWD/src/vendor"
          luarocks --dev install --tree="$vendor_tree" --lua-version=5.1 tl

      - name: Type-check
        working-directory: tecs-starter
        run: |
          eval "$(luarocks --lua-version=5.1 path --local --bin)"
          tecs check

      - name: Build
        working-directory: tecs-starter
        run: |
          eval "$(luarocks --lua-version=5.1 path --local --bin)"
          tecs build

  check-build-windows:
    name: windows-latest
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    env:
      TECS_DIR: ${{ github.workspace }}/tecs

    steps:
      - name: Check out starter
        uses: actions/checkout@v4
        with:
          path: tecs-starter

      - name: Check out Tecs
        uses: actions/checkout@v4
        with:
          repository: tecs-dev/tecs
          path: tecs

      - name: Check out tecs-cli
        uses: actions/checkout@v4
        with:
          repository: tecs-dev/tecs-cli
          path: tecs-cli

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            curl
            unzip
            zip
            tar
            rsync
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-7zip
            mingw-w64-x86_64-luajit

      - name: Install LuaRocks
        run: |
          ver=3.12.2
          curl -L -o luarocks.tar.gz "https://luarocks.org/releases/luarocks-${ver}.tar.gz"
          tar xzf luarocks.tar.gz
          cd "luarocks-${ver}"
          ./configure --prefix=/mingw64 --lua-version=5.1 \
            --with-lua-interpreter=luajit \
            --with-lua=/mingw64 \
            --with-lua-include=/mingw64/include/luajit-2.1
          make
          make install

      - name: Configure LuaRocks
        run: |
          mkdir -p "$HOME/bin"
          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'a=()' \
            'for x in "$@"; do' \
            '  x="${x//\\//}"' \
            '  if [[ "$x" == */\*.\* ]]; then x="${x%/*.*}/."; fi' \
            '  a+=("$x")' \
            'done' \
            'exec /usr/bin/cp "${a[@]}"' > "$HOME/bin/cp-luarocks"
          chmod +x "$HOME/bin/cp-luarocks"
          luarocks config --scope user variables.SEVENZ /mingw64/bin/7z
          luarocks config --scope user variables.CP "$(cygpath -m /usr/bin/bash.exe) $(cygpath -m "$HOME/bin/cp-luarocks")"

      - name: Install tecs-cli
        working-directory: tecs-cli
        run: |
          export PATH="$HOME/bin:$HOME/.luarocks/bin:$PATH"
          luarocks --lua-version=5.1 install --local https://luarocks.org/ansicolors-1.0.2-3.src.rock
          luarocks --lua-version=5.1 install --local https://luarocks.org/argparse-0.7.2-1.src.rock
          luarocks --lua-version=5.1 install --local https://luarocks.org/luafilesystem-1.9.0-1.src.rock
          luarocks --lua-version=5.1 make --local --deps-mode=none tecs-cli-0.1.0-1.rockspec

      - name: Install Teal
        working-directory: tecs-starter
        run: |
          export PATH="$HOME/bin:$HOME/.luarocks/bin:$PATH"
          vendor_tree="$(pwd -W)/src/vendor"
          luarocks --dev install --tree="$vendor_tree" --lua-version=5.1 tl
          cd "$GITHUB_WORKSPACE/tecs-starter"

      - name: Type-check
        working-directory: tecs-starter
        run: |
          export PATH="$HOME/bin:$HOME/.luarocks/bin:$PATH"
          tecs check

      - name: Build
        working-directory: tecs-starter
        run: |
          export PATH="$HOME/bin:$HOME/.luarocks/bin:$PATH"
          tecs build
